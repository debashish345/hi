<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interview Resources — Curated Study Materials</title>
  <meta name="description" content="Curated DSA, Java, JavaScript, and System Design resources for interview preparation." />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ── Header ─────────────────────────────────────────────────── -->
  <header class="site-header" id="site-header">
    <div class="header-inner">
      <div class="header-left">
        <div class="logo">
          <span class="logo-icon">📚</span>
          <div class="logo-text">
            <h1>Interview Resources</h1>
            <p class="logo-subtitle">Curated study materials</p>
          </div>
        </div>
      </div>
      <div class="header-center">
        <div class="search-wrapper" id="search-wrapper">
          <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <input id="search-input" type="text" placeholder="Search resources..." autocomplete="off" />
        </div>
      </div>
      <div class="header-right">
        <div class="header-tabs">
          <button class="header-tab active" data-tab="all-items">All items</button>
          <button class="header-tab" data-tab="for-you">For you</button>
        </div>
        <a href="admin.html" class="admin-link" title="Admin Panel">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
        </a>
      </div>
    </div>
  </header>

  <!-- ── Category Tabs ───────────────────────────────────────────── -->
  <nav class="category-tabs" id="category-tabs">
    <div class="tabs-inner">
      <!-- Populated by JS -->
    </div>
  </nav>

  <!-- ── Main Content ────────────────────────────────────────────── -->
  <main class="main-content" id="main-content">
    <!-- Sections populated by JS -->
  </main>

  <!-- ── Empty State ─────────────────────────────────────────────── -->
  <div id="empty-state" class="empty-state hidden">
    <span class="empty-icon">🔍</span>
    <h3>No resources found</h3>
    <p>Try adjusting your search or filter criteria</p>
    <button id="clear-filters-btn" class="btn-clear">Clear filters</button>
  </div>

  <!-- App JS -->
  <script src="js/app.js"></script>
</body>
</html>
