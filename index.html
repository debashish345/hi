<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interview Hub — Resource Manager</title>
  <meta name="description" content="Curated DSA, Java, JavaScript, and System Design resources for interview prep." />

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            display: ['Syne', 'sans-serif'],
            mono: ['Space Mono', 'monospace'],
          },
        }
      }
    }
  </script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css" />
</head>

<body class="dark bg-zinc-950 text-zinc-200 font-display antialiased">

  <!-- Gradient mesh bg -->
  <div class="gradient-mesh"></div>

  <!-- ── App Shell ────────────────────────────────────────────────── -->
  <div class="relative z-10 flex h-screen overflow-hidden">

    <!-- ── Sidebar Overlay (mobile) ──────────────────────────────── -->
    <div id="sidebar-overlay" class="hidden fixed inset-0 z-30 lg:hidden" onclick="toggleSidebar()"></div>

    <!-- ── Sidebar ───────────────────────────────────────────────── -->
    <aside id="sidebar" class="fixed lg:relative z-40 w-64 h-full flex flex-col
                               -translate-x-full lg:translate-x-0 transition-transform duration-300">

      <!-- Logo -->
      <div class="flex items-center gap-3 px-6 py-5 border-b border-zinc-800/60">
        <div class="relative w-9 h-9 flex items-center justify-center rounded-xl bg-violet-600/20 border border-violet-500/30">
          <span class="text-lg">🎯</span>
          <span class="logo-dot absolute -top-0.5 -right-0.5 w-2 h-2 bg-violet-400 rounded-full"></span>
        </div>
        <div>
          <h1 class="font-extrabold text-base text-white leading-none tracking-tight">Interview Hub</h1>
          <p class="text-xs text-zinc-500 mt-0.5 font-mono">Resource Manager</p>
        </div>
      </div>

      <!-- Nav -->
      <nav class="flex-1 overflow-y-auto px-3 py-4 space-y-1" id="category-nav">
        <!-- Populated by JS -->
      </nav>

      <!-- Footer -->
      <div class="px-4 py-4 border-t border-zinc-800/60">
        <a href="https://github.com" target="_blank"
           class="flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-zinc-800/60 transition-colors group">
          <svg class="w-5 h-5 text-zinc-500 group-hover:text-zinc-300" fill="currentColor" viewBox="0 0 24 24">
            <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/>
          </svg>
          <span class="text-sm text-zinc-500 group-hover:text-zinc-300 transition-colors">View on GitHub</span>
        </a>
      </div>
    </aside>

    <!-- ── Main Content ───────────────────────────────────────────── -->
    <main class="flex-1 flex flex-col overflow-hidden">

      <!-- ── Top Bar ─────────────────────────────────────────────── -->
      <header class="flex-shrink-0 flex items-center gap-4 px-6 py-4 border-b border-zinc-800/60 bg-zinc-950/80 backdrop-blur-sm">

        <!-- Mobile menu toggle -->
        <button onclick="toggleSidebar()" class="lg:hidden p-2 rounded-lg bg-zinc-800 hover:bg-zinc-700 transition-colors">
          <svg class="w-5 h-5 text-zinc-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>

        <!-- Search -->
        <div class="flex-1 max-w-lg relative">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
          </svg>
          <input id="search-input" type="text" placeholder="Search resources, tags, topics…"
                 class="w-full bg-zinc-900 border border-zinc-800 rounded-xl pl-10 pr-4 py-2.5 text-sm
                        text-zinc-200 placeholder-zinc-600 transition-all duration-200" />
        </div>

        <!-- View toggle -->
        <div class="flex items-center gap-1 bg-zinc-900 border border-zinc-800 rounded-xl p-1">
          <button id="btn-grid" onclick="setView('grid')"
                  class="active-view p-2 rounded-lg transition-all duration-150">
            <svg class="w-4 h-4 text-zinc-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/>
            </svg>
          </button>
          <button id="btn-list" onclick="setView('list')"
                  class="p-2 rounded-lg transition-all duration-150 hover:bg-zinc-800">
            <svg class="w-4 h-4 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
          </button>
        </div>
      </header>

      <!-- ── Scroll Area ─────────────────────────────────────────── -->
      <div class="flex-1 overflow-y-auto px-6 py-6 space-y-6" id="app">

        <!-- Stats Row -->
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
          <div class="stat-card bg-zinc-900/60 border border-zinc-800 rounded-2xl p-4 transition-all duration-200 hover:border-violet-500/30">
            <p class="text-xs text-zinc-500 font-mono mb-1">TOTAL</p>
            <p id="stat-total" class="text-3xl font-extrabold text-white">—</p>
            <p class="text-xs text-zinc-600 mt-1">Resources</p>
          </div>
          <div class="stat-card bg-zinc-900/60 border border-zinc-800 rounded-2xl p-4 transition-all duration-200 hover:border-blue-500/30">
            <p class="text-xs text-zinc-500 font-mono mb-1">HTML</p>
            <p id="stat-html" class="text-3xl font-extrabold text-blue-400">—</p>
            <p class="text-xs text-zinc-600 mt-1">Pages</p>
          </div>
          <div class="stat-card bg-zinc-900/60 border border-zinc-800 rounded-2xl p-4 transition-all duration-200 hover:border-amber-500/30">
            <p class="text-xs text-zinc-500 font-mono mb-1">MARKDOWN</p>
            <p id="stat-md" class="text-3xl font-extrabold text-amber-400">—</p>
            <p class="text-xs text-zinc-600 mt-1">Docs</p>
          </div>
          <div class="stat-card bg-zinc-900/60 border border-zinc-800 rounded-2xl p-4 transition-all duration-200 hover:border-red-500/30">
            <p class="text-xs text-zinc-500 font-mono mb-1">ADVANCED</p>
            <p id="stat-adv" class="text-3xl font-extrabold text-red-400">—</p>
            <p class="text-xs text-zinc-600 mt-1">Topics</p>
          </div>
        </div>

        <!-- Section Header -->
        <div class="flex items-center gap-4">
          <div>
            <h2 class="text-lg font-bold text-white leading-none">Resources</h2>
          </div>
          <div class="section-line"></div>
          <span id="result-count" class="text-xs font-mono text-zinc-500 whitespace-nowrap">— resources</span>
        </div>

        <!-- Filter Bar -->
        <div id="filter-bar" class="flex items-center gap-2 flex-wrap">
          <!-- Populated by JS -->
        </div>

        <!-- Resource Grid -->
        <div id="resource-grid" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-4">
          <!-- Cards populated by JS -->
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="hidden flex flex-col items-center justify-center py-24 text-center">
          <span class="text-6xl mb-4">🔍</span>
          <h3 class="text-xl font-bold text-zinc-400 mb-2">No resources found</h3>
          <p class="text-zinc-600 text-sm">Try adjusting your search or filter criteria</p>
          <button onclick="state.searchQuery=''; document.getElementById('search-input').value=''; state.activeFilter='all'; renderContent();"
                  class="mt-4 px-4 py-2 rounded-xl bg-zinc-800 hover:bg-zinc-700 text-sm text-zinc-300 transition-colors">
            Clear filters
          </button>
        </div>

      </div>
      <!-- end scroll area -->
    </main>
  </div>

  <!-- App JS -->
  <script src="js/app.js"></script>
</body>
</html>
