<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interview Resources — by blackshirt.in</title>
  <meta name="description"
    content="Curated DSA, Java, JavaScript, and System Design resources for interview preparation." />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet" />

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/lld-viewer.css" />
</head>

<body>

  <!-- ── Header ─────────────────────────────────────────────────── -->
  <header class="site-header" id="site-header">
    <div class="header-inner">
      <div class="header-left">
        <div class="logo">
          <span class="logo-icon">📚</span>
          <div class="logo-text">
            <h1>Interview Resources</h1>
            <p class="logo-subtitle">by blackshirt.in</p>
          </div>
        </div>
      </div>
      <div class="header-center">
        <div class="search-wrapper" id="search-wrapper">
          <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <input id="search-input" type="text" placeholder="Search resources..." autocomplete="off" />
        </div>
      </div>
      <div class="header-right">
        <div class="header-tabs">
          <button class="header-tab active" data-tab="all-items">All items</button>
          <button class="header-tab" data-tab="for-you">For you</button>
        </div>
        <a href="https://github.com/debashish345/hi" class="admin-link github-link" title="GitHub Repository" target="_blank">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path>
          </svg>
        </a>
        <button id="theme-toggle" class="header-tab theme-toggle" title="Toggle Theme" aria-label="Toggle Theme"
          style="display:flex; align-items:center; justify-content:center; width:34px; height:34px; padding:0;">
          <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" style="display:none;">
            <circle cx="12" cy="12" r="5" />
            <line x1="12" y1="1" x2="12" y2="3" />
            <line x1="12" y1="21" x2="12" y2="23" />
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
            <line x1="1" y1="12" x2="3" y2="12" />
            <line x1="21" y1="12" x2="23" y2="12" />
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
          </svg>
          <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
          </svg>
        </button>
        <a href="admin.html" class="admin-link" title="Admin Panel">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path
              d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
            </path>
          </svg>
        </a>
      </div>
    </div>
  </header>

  <!-- ── Category Tabs ───────────────────────────────────────────── -->
  <nav class="category-tabs" id="category-tabs">
    <div class="tabs-inner">
      <!-- Populated by JS -->
    </div>
  </nav>

  <!-- ── Main Content ────────────────────────────────────────────── -->
  <main class="main-content" id="main-content">
    <!-- Sections populated by JS -->
  </main>

  <!-- ── Resource Viewer (SPA) ────────────────────────────────────── -->
  <div id="resource-viewer" class="resource-viewer hidden">
    <button id="close-viewer-btn" class="btn-back">← Back to Resources</button>
    <div id="resource-content-frame"></div>
  </div>

  <!-- ── Empty State ─────────────────────────────────────────────── -->
  <div id="empty-state" class="empty-state hidden">
    <span class="empty-icon">🔍</span>
    <h3>No resources found</h3>
    <p>Try adjusting your search or filter criteria</p>
    <button id="clear-filters-btn" class="btn-clear">Clear filters</button>
  </div>

  <template id="lld-template">
    <div id="loading-screen" class="loading-screen">
      <div class="loader-spinner"></div>
      <p>Loading LLD Problem...</p>
    </div>
    <div id="error-screen" class="error-screen hidden">
      <span class="error-icon">⚠️</span>
      <h2>Problem Not Found</h2>
      <p id="error-msg">The requested LLD problem could not be loaded.</p>
    </div>
    <div id="lld-page" class="lld-page hidden">
      <header class="lld-header" id="lld-header">
        <h1 id="lld-title" class="lld-title"></h1>
        <div id="lld-question" class="lld-question"></div>
      </header>
      <div id="lld-badges" class="badge-row"></div>
      <section class="content-section" id="diagram-section">
        <h2 class="section-heading"><span class="heading-bar"></span> Entity Class Design</h2>
        <div id="mermaid-container" class="mermaid-container"></div>
      </section>
      <section class="content-section" id="code-section">
        <h2 class="section-heading"><span class="heading-bar"></span> Implementation Code</h2>
        <p class="section-desc">Browse the full source code. Click any file in the tree to view it. Supports syntax
          highlighting, folding, and search (<kbd>Ctrl+F</kbd>).</p>
        <div class="editor-split" id="editor-split">
          <div class="file-tree-panel" id="file-tree-panel">
            <div class="file-tree-header">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />
              </svg>
              <span id="tree-repo-name">Project Files</span>
            </div>
            <div id="file-tree" class="file-tree"></div>
          </div>
          <div class="editor-panel">
            <div class="editor-toolbar" id="editor-toolbar">
              <div class="editor-file-path" id="editor-file-path">
                <span class="path-icon">📄</span>
                <span id="active-file-name">Select a file</span>
              </div>
              <div class="editor-actions">
                <button class="action-btn" id="copy-btn" title="Copy code">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="9" y="9" width="13" height="13" rx="2" />
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
                  </svg>
                  <span>Copy</span>
                </button>
                <button class="action-btn" id="fullscreen-btn" title="Toggle fullscreen">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="15 3 21 3 21 9" />
                    <polyline points="9 21 3 21 3 15" />
                    <line x1="21" y1="3" x2="14" y2="10" />
                    <line x1="3" y1="21" x2="10" y2="14" />
                  </svg>
                </button>
              </div>
            </div>
            <div id="monaco-editor" class="monaco-wrapper"></div>
            <div class="editor-statusbar">
              <span id="status-lang">—</span>
              <span id="status-lines">Lines: —</span>
              <span id="status-cursor">Ln 1, Col 1</span>
            </div>
          </div>
        </div>
        <div id="code-loading" class="code-loading hidden">
          <div class="loader-spinner small"></div>
          <span>Fetching code from GitHub...</span>
        </div>
      </section>
      <section class="content-section" id="walkthrough-section">
        <h2 class="section-heading"><span class="heading-bar"></span> Code Walkthrough</h2>
        <div id="walkthrough-list" class="walkthrough-list"></div>
      </section>
      <section class="content-section" id="followup-section">
        <h2 class="section-heading"><span class="heading-bar"></span> Follow-up Questions</h2>
        <div id="followup-list" class="followup-list"></div>
      </section>
    </div>
  </template>

  <!-- ── Dependencies for LLD Viewer ────────────────────────────────── -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@9.4.3/dist/mermaid.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
  <script src="js/lld-viewer.js"></script>
  <!-- App JS -->
  <script src="js/app.js"></script>
</body>

</html>
