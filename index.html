<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interview Resources</title>
  <meta name="description" content="A curated, community-driven interview prep hub covering DSA, System Design, Behavioral, Java, AWS, DevOps, and more." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<!-- ─── Header ─────────────────────────────── -->
<header>
  <div class="header-left">
    <div class="logo">
      <svg viewBox="0 0 20 20">
        <path d="M9 4H5a1 1 0 00-1 1v10a1 1 0 001 1h10a1 1 0 001-1v-4a1 1 0 10-2 0v3H6V6h3a1 1 0 100-2zm5.293-.707a1 1 0 010 1.414l-7 7a1 1 0 01-1.414-1.414l7-7a1 1 0 011.414 0z"/>
        <path d="M15 4h-3a1 1 0 110-2h4a1 1 0 011 1v4a1 1 0 11-2 0V4z"/>
      </svg>
    </div>
    <div class="header-title">
      <h1>Interview Resources</h1>
      <p>Your curated prep hub</p>
    </div>
  </div>

  <div class="header-right">
    <div class="header-stats">
      <span id="total-stat"><strong>—</strong> resources</span>
    </div>

    <!-- Search -->
    <div class="search-bar">
      <svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="9" cy="9" r="6"/><path d="M15 15l3 3"/>
      </svg>
      <input type="text" id="search-input" placeholder="Search resources…" />
    </div>

    <!-- Bookmarks toggle -->
    <button class="btn-icon" id="btn-bookmarks" title="View bookmarks">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7">
        <path d="M5 3h10a1 1 0 011 1v13l-6-3-6 3V4a1 1 0 011-1z" stroke-linejoin="round"/>
      </svg>
      <span>Bookmarks</span>
    </button>

    <!-- Download progress -->
    <button class="btn-icon" id="btn-download" title="Download your progress">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7">
        <path d="M10 3v9m0 0l-3-3m3 3l3-3" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M3 14v2a1 1 0 001 1h12a1 1 0 001-1v-2" stroke-linecap="round"/>
      </svg>
      <span>Export</span>
    </button>

    <!-- Import progress -->
    <button class="btn-icon" id="btn-import" title="Import saved progress">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7">
        <path d="M10 17V8m0 0l-3 3m3-3l3 3" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M3 6V4a1 1 0 011-1h12a1 1 0 011 1v2" stroke-linecap="round"/>
      </svg>
      <span>Import</span>
    </button>
    <input type="file" id="import-input" accept=".json" style="display:none" />
  </div>
</header>

<!-- ─── Main ──────────────────────────────── -->
<main id="main-content">

  <!-- Last Read -->
  <div id="last-read-section"></div>

  <!-- Progress Bar -->
  <div class="progress-bar-wrap" id="progress-bar-wrap">
    <span class="progress-label"><strong>0/0</strong> resources read &nbsp;·&nbsp; 0%</span>
    <div class="progress-track">
      <div class="progress-fill" style="width:0%"></div>
    </div>
  </div>

  <!-- Filter Bar -->
  <div class="filter-bar" id="filter-bar">
    <button class="filter-chip active" data-filter="all">All</button>
    <!-- dynamically populated from JSON -->
  </div>

  <!-- Resource Sections -->
  <div id="sections-container"></div>
</main>

<!-- ─── Modal ─────────────────────────────── -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <!-- dynamically populated -->
  </div>
</div>

<!-- ─── Toast ─────────────────────────────── -->
<div class="toast" id="toast"></div>

<!-- ─── Script ────────────────────────────── -->
<script src="js/app.js"></script>
</body>
</html>
