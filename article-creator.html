<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Article Creator — Interview Resources</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css" />
  <style>
    :root {
      --sidebar-width: 320px;
      --header-h: 60px;
      --footer-h: 30px;
    }
    body {
      background: var(--bg-body);
      color: var(--text-primary);
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
      margin: 0;
    }

    /* ─── Header ─────────────────────────────────────────────────── */
    .creator-header {
      height: var(--header-h);
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border-light);
      background: var(--bg-white);
      z-index: 10;
      flex-shrink: 0;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .back-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      transition: color var(--transition);
    }
    .back-btn:hover { color: var(--accent); }
    .creator-title { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .header-right { display: flex; gap: 12px; }

    /* ─── Main Layout ─────────────────────────────────────────────── */
    .creator-main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    .creator-sidebar {
      width: var(--sidebar-width);
      background: var(--bg-white);
      border-right: 1px solid var(--border-light);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 24px;
      flex-shrink: 0;
    }
    .sidebar-section { margin-bottom: 24px; }
    .sidebar-section h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 12px; }
    
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 6px; color: var(--text-secondary); }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--border-medium);
      border-radius: var(--radius-md);
      font-family: inherit;
      font-size: 13px;
      background: var(--bg-body);
      color: var(--text-primary);
    }

    .creator-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .content-tabs {
      height: 40px;
      background: var(--bg-white);
      border-bottom: 1px solid var(--border-light);
      display: flex;
      padding: 0 16px;
      flex-shrink: 0;
    }
    .tab {
      padding: 0 20px;
      height: 100%;
      display: flex;
      align-items: center;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      border-bottom: 2px solid transparent;
    }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    .editor-container { flex: 1; display: flex; overflow: hidden; }
    .monaco-pane { flex: 1; height: 100%; }
    .preview-pane {
      flex: 1;
      height: 100%;
      background: var(--bg-white);
      border-left: 1px solid var(--border-light);
      overflow-y: auto;
      padding: 40px;
      display: none;
    }
    .editor-container.split .preview-pane { display: block; }
    .editor-container.preview-only .monaco-pane { display: none; }
    .editor-container.preview-only .preview-pane { display: block; border-left: none; }

    .creator-footer {
      height: var(--footer-h);
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid var(--border-light);
      background: var(--bg-white);
      font-size: 11px;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .btn {
      padding: 8px 16px;
      border-radius: var(--radius-md);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all var(--transition);
      border: 1px solid transparent;
    }
    .btn-primary { background: var(--accent); color: white; }
    .btn-secondary { background: var(--bg-hover); color: var(--text-primary); border-color: var(--border-light); }

    .preview-content { max-width: 800px; margin: 0 auto; }
    .preview-content h1 { font-size: 32px; margin-bottom: 16px; }
    .preview-content h2 { font-size: 24px; margin: 32px 0 16px; }
    .preview-content .desc { font-size: 18px; color: var(--text-secondary); margin-bottom: 24px; }
    .preview-content p { line-height: 1.7; margin-bottom: 16px; }
    .preview-content pre { background: #1e1e2e; color: #cdd6f4; padding: 20px; border-radius: 10px; overflow-x: auto; margin-bottom: 24px; }

    [data-theme="dark"] .creator-header,
    [data-theme="dark"] .creator-sidebar,
    [data-theme="dark"] .creator-footer,
    [data-theme="dark"] .content-tabs,
    [data-theme="dark"] .preview-pane {
      background: #1a1d27; border-color: #2a2d39;
    }
  </style>
</head>
<body data-theme="light">

  <header class="creator-header">
    <div class="header-left">
      <a href="admin.html" class="back-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        Admin
      </a>
      <div class="creator-title">🖋️ Article Creator</div>
    </div>
    <div class="header-right">
      <button class="btn btn-secondary" id="btn-copy-content">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copy Code
      </button>
      <button class="btn btn-secondary" id="btn-download">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
        Download File
      </button>
      <button class="btn btn-primary" id="btn-copy-resource">Copy Metadata</button>
    </div>
  </header>

  <main class="creator-main">
    <aside class="creator-sidebar">
      <div class="sidebar-section">
        <h3>Metadata</h3>
        <div class="form-group">
          <label>Title</label>
          <input type="text" id="art-title" placeholder="e.g. Arrays & Strings" />
        </div>
        <div class="form-group">
          <label>Slug</label>
          <input type="text" id="art-slug" />
        </div>
        <div class="form-group">
          <label>Format</label>
          <select id="art-format">
            <option value="html">HTML</option>
            <option value="md">Markdown</option>
          </select>
        </div>
      </div>
      <div class="sidebar-section">
        <h3>Properties</h3>
        <div class="form-group">
          <label>Difficulty</label>
          <select id="art-difficulty">
            <option>Beginner</option>
            <option>Intermediate</option>
            <option>Advanced</option>
          </select>
        </div>
        <div class="form-group">
          <label>Tags (csv)</label>
          <input type="text" id="art-tags" />
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="art-desc" rows="3"></textarea>
        </div>
      </div>
    </aside>

    <section class="creator-content">
      <div class="content-tabs">
        <div class="tab active" data-view="editor">Editor</div>
        <div class="tab" data-view="split">Split</div>
        <div class="tab" data-view="preview">Preview</div>
      </div>
      <div class="editor-container" id="editor-container">
        <div id="monaco-editor" class="monaco-pane"></div>
        <div id="preview-pane" class="preview-pane">
          <div class="preview-content" id="preview-content"></div>
        </div>
      </div>
    </section>
  </main>

  <footer class="creator-footer">
    <div id="status-left">Lines: 0</div>
    <div id="status-cursor">Ln 1, Col 1</div>
    <div id="status-right">HTML</div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
  
  <script>
    let editor = null;
    require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' } });
    
    require(['vs/editor/editor.main'], function() {
      const isDark = localStorage.getItem('theme') === 'dark';
      if (isDark) document.body.setAttribute('data-theme', 'dark');

      // Parse URL params
      const params = new URLSearchParams(window.location.search);
      if (params.has('title')) document.getElementById('art-title').value = params.get('title');
      if (params.has('slug')) document.getElementById('art-slug').value = params.get('slug');
      if (params.has('type')) document.getElementById('art-format').value = params.get('type');
      if (params.has('difficulty')) document.getElementById('art-difficulty').value = params.get('difficulty');
      if (params.has('tags')) document.getElementById('art-tags').value = params.get('tags');
      if (params.has('desc')) document.getElementById('art-desc').value = params.get('desc');

      const initialFormat = document.getElementById('art-format').value;

      editor = monaco.editor.create(document.getElementById('monaco-editor'), {
        value: getTemplate(initialFormat),
        language: initialFormat === 'html' ? 'html' : 'markdown',
        theme: isDark ? 'vs-dark' : 'vs',
        automaticLayout: true,
        fontSize: 14,
        fontFamily: 'JetBrains Mono, monospace',
        lineHeight: 22,
        fontLigatures: true,
        fixedOverflowWidgets: true,
        padding: { top: 20 },
        minimap: { enabled: false }
      });

      editor.onDidChangeModelContent(updatePreview);
      
      // Update cursor position display
      editor.onDidChangeCursorPosition(e => {
        const pos = editor.getPosition();
        document.getElementById('status-cursor').textContent = `Ln ${pos.lineNumber}, Col ${pos.column}`;
      });

      // Crucial fix for font loading misalignment
      if (document.fonts) {
        document.fonts.ready.then(() => {
          monaco.editor.remeasureFonts();
          editor.layout();
        });
      }

      // Backup layout fix
      setTimeout(() => {
        monaco.editor.remeasureFonts();
        editor.layout();
      }, 1000);

      updatePreview();
      document.getElementById('status-right').textContent = initialFormat.toUpperCase();
    });

    function getTemplate(f) {
      return f === 'html' ? `<div class="container">\n  <h1>Title</h1>\n  <p class="desc">Intro...</p>\n  <h2>Section</h2>\n  <p>Content...</p>\n</div>` 
                          : `# Title\nIntro...\n\n## Section\nContent...`;
    }

    function updatePreview() {
      const val = editor.getValue();
      const format = document.getElementById('art-format').value;
      const preview = document.getElementById('preview-content');
      
      // Resolve marked renderer (global or AMD)
      const renderer = window.marked || (typeof require === 'function' ? require('marked') : null);
      
      if (format === 'md' && renderer) {
        preview.innerHTML = renderer.parse(val);
      } else {
        preview.innerHTML = val;
      }
      document.getElementById('status-left').textContent = `Lines: ${editor.getModel().getLineCount()}`;
    }

    document.getElementById('art-title').oninput = e => {
      document.getElementById('art-slug').value = e.target.value.toLowerCase().replace(/[^a-z0-9]+/g, '-');
    };

    document.getElementById('art-format').onchange = e => {
      const format = e.target.value;
      monaco.editor.setModelLanguage(editor.getModel(), format === 'html' ? 'html' : 'markdown');
      editor.setValue(getTemplate(format));
      document.getElementById('status-right').textContent = format.toUpperCase();
      updatePreview();
    };

    document.querySelectorAll('.tab').forEach(t => {
      t.onclick = () => {
        document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
        t.classList.add('active');
        const v = t.dataset.view;
        const c = document.getElementById('editor-container');
        const m = document.getElementById('monaco-editor');
        const p = document.getElementById('preview-pane');
        
        c.classList.remove('split', 'preview-only');
        m.style.display = 'block';
        p.style.display = 'none';

        if (v === 'split') {
          c.classList.add('split');
          p.style.display = 'block';
          p.style.borderLeft = '1px solid var(--border-light)';
        } else if (v === 'preview') {
          c.classList.add('preview-only');
          p.style.display = 'block';
          p.style.borderLeft = 'none';
          m.style.display = 'none';
        }
        
        updatePreview();
        editor.layout();
      };
    });

    document.getElementById('btn-download').onclick = () => {
      const content = editor.getValue();
      const format = document.getElementById('art-format').value;
      const slug = document.getElementById('art-slug').value || 'article';
      const blob = new Blob([content], { type: 'text/plain' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `${slug}.${format}`;
      a.click();
    };

    document.getElementById('btn-copy-content').onclick = () => {
      navigator.clipboard.writeText(editor.getValue());
      const btn = document.getElementById('btn-copy-content');
      const originalText = btn.textContent;
      btn.textContent = '✅ Copied!';
      setTimeout(() => btn.textContent = originalText, 2000);
    };

    document.getElementById('btn-copy-resource').onclick = () => {
      const res = {
        title: document.getElementById('art-title').value,
        type: document.getElementById('art-format').value,
        difficulty: document.getElementById('art-difficulty').value,
        tags: document.getElementById('art-tags').value.split(',').map(x => x.trim()).filter(Boolean),
        path: `data/custom/${document.getElementById('art-slug').value}.${document.getElementById('art-format').value}`,
        description: document.getElementById('art-desc').value,
        lastUpdated: new Date().toISOString().split('T')[0],
        slug: document.getElementById('art-slug').value
      };
      navigator.clipboard.writeText(JSON.stringify(res, null, 2));
      alert('Metadata copied!');
    };
  </script>
</body>
</html>
